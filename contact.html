<main id="contact">
    <h2>Get In Touch</h2>
    <p>Have a question about my game dev projects or just want to say hi? Fill out the form below!</p>
    
    <form action="#" method="post" class="responsive-form" onsubmit="alert('Thanks for your message!')">
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="subject">Topic:</label>
        <select id="subject" name="subject">
            <option value="general">General Question</option>
            <option value="gamedev">Game Development</option>
            <option value="collaboration">Collaboration</option>
        </select>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <input type="submit" value="Send Message" class="submit-btn">
    </form>
</main>
